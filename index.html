<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#010205">
  <title>Walk-Up Music</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Walk-Up Music</h1>
    <nav>
      <button class="tab active" data-tab="lineup">Lineup</button>
      <button class="tab" data-tab="roster">Roster</button>
      <button class="tab" data-tab="settings">Settings</button>
    </nav>
  </header>

  <main>
    <section id="lineup-view" class="view active">
      <div id="lineup-header">
        <h3>Batting Order</h3>
        <button id="clear-lineup-btn" class="clear-btn">Clear</button>
      </div>
      <div id="lineup-list"></div>
      <div id="available-players">
        <h3>Tap to add to lineup</h3>
        <div id="available-list"></div>
      </div>
    </section>

    <section id="roster-view" class="view"></section>

    <section id="settings-view" class="view">
      <div class="settings-section">
        <h3>Playback Duration</h3>
        <p class="settings-desc">How long walk-up songs play before fading out (seconds).</p>
        <div class="settings-row">
          <input type="range" id="global-duration" min="5" max="60" value="30" step="5">
          <span id="global-duration-label" class="settings-value">30s</span>
        </div>
      </div>

      <div class="settings-section">
        <h3>Walk-Up Songs</h3>
        <p class="settings-desc">Set the start time for each player's song.</p>
        <div id="song-settings-list"></div>
      </div>
    </section>
  </main>

  <div id="playback-bar">
    <div id="progress-bar">
      <div id="progress-fill"></div>
    </div>
    <div id="playback-main">
      <div id="playback-info">
        <span id="playback-number"></span>
        <span id="playback-name">No player selected</span>
        <span id="playback-status"></span>
        <span id="playback-timer"><span id="time-current">--:--</span> / <span id="time-total">--:--</span></span>
        <button id="expand-btn" aria-label="Expand">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"></polyline>
          </svg>
        </button>
      </div>
      <div id="transport">
        <button id="prev-btn" class="transport-btn" disabled aria-label="Previous">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="5" width="3" height="14"/><polygon points="21 5 9 12 21 19 21 5"/></svg>
        </button>
        <button id="play-pause-btn" class="transport-btn primary" disabled aria-label="Play">
          <svg id="play-icon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
          <svg id="pause-icon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>
        </button>
        <button id="next-btn" class="transport-btn" disabled aria-label="Next">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="3 5 15 12 3 19 3 5"/><rect x="18" y="5" width="3" height="14"/></svg>
        </button>
      </div>
      <button id="batter-btn" disabled>Next Batter</button>
    </div>
  </div>

  <div id="now-playing" class="hidden">
    <button id="collapse-btn" aria-label="Collapse">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </button>

    <div id="np-current-label">Now Batting</div>

    <div id="np-batter">
      <div id="np-number"></div>
      <div id="np-name"></div>
    </div>

    <div id="np-progress">
      <div id="np-progress-bar">
        <div id="np-progress-fill"></div>
      </div>
      <div id="np-times">
        <span id="np-time-current">0:00</span>
        <span id="np-time-total">0:00</span>
      </div>
    </div>

    <div id="np-transport">
      <button id="np-prev-btn" class="np-transport-btn" aria-label="Previous">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="5" width="3" height="14"/><polygon points="21 5 9 12 21 19 21 5"/></svg>
      </button>
      <button id="np-play-pause-btn" class="np-transport-btn primary" aria-label="Play">
        <svg id="np-play-icon" width="44" height="44" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
        <svg id="np-pause-icon" width="44" height="44" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>
      </button>
      <button id="np-next-btn" class="np-transport-btn" aria-label="Next">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="3 5 15 12 3 19 3 5"/><rect x="18" y="5" width="3" height="14"/></svg>
      </button>
    </div>

    <button id="np-batter-btn">Stop Batter</button>

    <div id="np-up-next">
      <span class="np-up-next-label">Up Next</span>
      <div id="np-next-batter">—</div>
    </div>
  </div>

  <audio id="announcement-audio" preload="none"></audio>
  <audio id="walkup-audio" preload="none"></audio>

  <script src="app.js"></script>
</body>
</html>
